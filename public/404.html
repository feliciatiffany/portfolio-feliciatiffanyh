<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <title>Redirecting…</title>
    <script>
      
      const BASE = "/";

      const { pathname, search, hash } = window.location;
      const target = BASE + "?redirect=" + encodeURIComponent(pathname + search + hash);
      window.location.replace(target);
    </script>
  </head>
  <body></body>
</html>
